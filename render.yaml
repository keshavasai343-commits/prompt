databases:
  - name: promptcraft-db
    databaseName: promptcraft_db
    user: promptcraft
    plan: free

services:
  # ── Backend API (FastAPI) ──────────────────────────────────────────────────
  - type: web
    name: promptcraft-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: promptcraft-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: https://promptcraft-ui.onrender.com
      # Set these in the Render dashboard after first deploy
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false

  # ── Frontend (React / Vite static site) ───────────────────────────────────
  - type: static
    name: promptcraft-ui
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://promptcraft-api.onrender.com/api/v1
